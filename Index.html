<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TripGo"/>
<title>TripGo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
/* ===================== RESET ===================== */
*{box-sizing:border-box;margin:0;padding:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-tap-highlight-color:transparent}
:root{
  --blue:#1A73E8;--green:#34A853;--red:#EA4335;--yellow:#F9AB00;
  --gray:#5F6368;--bg:#fff;--bg2:#F8F9FA;--border:#DADCE0;
  --text:#202124;--text2:#5F6368;
}
html,body{width:100%;height:100%;overflow:hidden;background:#1A73E8}

/* ===================== JOIN SCREEN ===================== */
#S-join{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(160deg,#1565C0,#1A73E8 50%,#1976D2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;
}
#S-join.hide{display:none}

.js-gear{
  position:absolute;top:16px;right:16px;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.2);border:none;cursor:pointer;
  color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
}
.js-logo{font-size:52px;margin-bottom:8px}
.js-title{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
.js-sub{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:32px}

/* Gear dropdown */
#js-gear-menu{
  position:absolute;top:60px;right:16px;
  background:#fff;border-radius:14px;padding:6px;
  box-shadow:0 8px 32px rgba(0,0,0,.22);
  min-width:180px;
  display:none;  /* HIDDEN BY DEFAULT */
  z-index:200;
}
#js-gear-menu.show{display:block}
.jgm-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;font-size:13px;color:var(--text);
  border:none;background:none;width:100%;text-align:left;
}
.jgm-item:active{background:var(--bg2)}
.jgm-item.red{color:var(--red)}
.jgm-sep{height:1px;background:var(--border);margin:3px 0}

/* Biometric */
#js-biometric{
  display:none;  /* HIDDEN BY DEFAULT */
  align-items:center;justify-content:center;gap:8px;
  width:100%;max-width:320px;
  padding:12px;margin-bottom:16px;
  border:1.5px solid rgba(255,255,255,.4);border-radius:12px;
  background:rgba(255,255,255,.15);color:#fff;
  font-size:13px;cursor:pointer;
}

/* Home panel */
#js-home{
  width:100%;max-width:320px;
  display:flex;flex-direction:column;gap:12px;
}
.js-big-btn{
  width:100%;padding:18px;border-radius:16px;border:none;cursor:pointer;
  display:flex;align-items:center;gap:14px;text-align:left;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
}
.js-big-btn:active{opacity:.9}
.js-big-btn.primary{background:#fff}
.js-big-btn.outline{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35)}
.jbb-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.jbb-ic.blue{background:#E8F0FE}
.jbb-ic.wh{background:rgba(255,255,255,.25)}
.jbb-txt{flex:1}
.jbb-h{font-size:15px;font-weight:700}
.jbb-s{font-size:11px;margin-top:2px;opacity:.7}
.js-big-btn.primary .jbb-h{color:var(--blue)}
.js-big-btn.primary .jbb-s{color:var(--text2)}
.js-big-btn.outline .jbb-h,.js-big-btn.outline .jbb-s{color:#fff}
.jbb-arr{font-size:18px;opacity:.5}
.js-big-btn.primary .jbb-arr{color:var(--blue)}
.js-big-btn.outline .jbb-arr{color:#fff}

/* Sub panel */
#js-sub{
  width:100%;max-width:320px;
  display:none;  /* HIDDEN BY DEFAULT */
}
.js-sub-hdr{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.js-back{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.2);border:none;cursor:pointer;
  color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.js-sub-title{font-size:18px;font-weight:700;color:#fff}
.js-field{margin-bottom:14px}
.js-label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.js-input{
  width:100%;border:none;border-radius:12px;padding:14px 16px;
  font-size:15px;color:var(--text);outline:none;-webkit-appearance:none;
  background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.js-input:focus{box-shadow:0 0 0 3px rgba(255,255,255,.4),0 2px 8px rgba(0,0,0,.12)}
.js-input.code{text-transform:uppercase;letter-spacing:3px;font-weight:700;font-size:18px;text-align:center}
.js-go{
  width:100%;padding:15px;border:none;border-radius:14px;
  background:#fff;color:var(--blue);font-size:15px;font-weight:700;
  cursor:pointer;margin-top:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.js-go:active{opacity:.9}
.js-err{font-size:12px;color:rgba(255,200,200,1);min-height:20px;margin-top:8px;text-align:center;font-weight:500}

/* Admin modal */
#M-admin{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.5);
  display:none;  /* HIDDEN BY DEFAULT */
  align-items:flex-end;justify-content:center;
}
#M-admin.show{display:flex}
.adm-box{
  background:#fff;border-radius:18px 18px 0 0;
  padding:20px 20px 40px;width:100%;max-width:400px;
}
.adm-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.adm-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.adm-field{margin-bottom:12px}
.adm-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block}
.adm-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text);outline:none;background:var(--bg2);-webkit-appearance:none}
.adm-input:focus{border-color:var(--blue)}
.adm-btns{display:flex;gap:8px;margin-top:14px}
.adm-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:13px;color:var(--gray)}
.adm-ok{flex:2;padding:12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.adm-err{font-size:12px;color:var(--red);text-align:center;min-height:16px;margin-top:6px}

/* ===================== MAIN APP ===================== */
#S-app{
  position:fixed;inset:0;z-index:50;
  display:none;  /* HIDDEN BY DEFAULT - shown after login */
  flex-direction:column;
  background:var(--bg);
}
#S-app.show{display:flex}

/* Top bar */
.topbar{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;
  background:var(--bg);border-bottom:1px solid var(--border);
  flex-shrink:0;height:44px;
}
.tb-logo{font-size:14px;font-weight:700;color:var(--blue);white-space:nowrap}
.tb-trip{font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-avs{display:flex;align-items:center}
.av{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;border:2px solid #fff;
  flex-shrink:0;position:relative;cursor:pointer;
}
.av0{background:#E8F0FE;color:#1A73E8}
.av1{background:#E6F4EA;color:#34A853}
.av2{background:#FCE8E6;color:#EA4335}
.av3{background:#FEF3E2;color:#F9AB00}
.av4{background:#F3E8FD;color:#8430CE}
.av5{background:#FDE8F0;color:#C2185B}
.av6{background:#E8F5E9;color:#2E7D32}
.av-crown{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:9px;line-height:1}
.tb-btn{
  background:none;border:none;cursor:pointer;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--gray);font-size:16px;flex-shrink:0;
}
.tb-btn:active{background:var(--bg2)}
.tb-invite{
  font-size:10px;background:var(--blue);color:#fff;
  border:none;border-radius:10px;padding:3px 8px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
}
.tb-org{font-size:9px;background:#E8F0FE;color:var(--blue);border-radius:8px;padding:2px 6px;white-space:nowrap;display:none}

/* Main layout */
.main{flex:1;display:flex;overflow:hidden;min-height:0}
@media(orientation:portrait){
  .main{flex-direction:column}
  #map-wrap{height:42vh;flex:none;border-bottom:1px solid var(--border)}
  .divider{height:10px;flex:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:ns-resize;touch-action:none;position:relative}
  .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
  .divider-dot{width:40px;height:5px;border-radius:3px;background:#C5C5C7;position:relative;z-index:1}
  #right{flex:1;min-height:0}
}
@media(orientation:landscape){
  .main{flex-direction:row}
  #map-wrap{width:58%;flex:none;border-right:1px solid var(--border)}
  .divider{width:10px;flex:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:ew-resize;touch-action:none;flex-direction:column;position:relative}
  .divider::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border)}
  .divider-dot{width:5px;height:40px;border-radius:3px;background:#C5C5C7;position:relative;z-index:1}
  #right{flex:1;min-width:0}
}

/* Map */
#map-wrap{position:relative;overflow:hidden;background:#e8ecef}
#gmap{position:absolute;inset:0}

/* Map search bar */
.map-search{
  position:absolute;top:10px;left:12px;
  width:calc(100% - 70px);max-width:380px;
  z-index:10;
}
.map-search-bar{
  display:flex;align-items:center;gap:8px;
  padding:0 14px;height:44px;
  background:#fff;border-radius:22px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.map-search-bar input{
  flex:1;border:none;outline:none;font-size:14px;color:var(--text);background:transparent;
}
.map-search-bar input::placeholder{color:var(--text2)}
#search-clear{display:none;background:none;border:none;cursor:pointer;color:var(--gray);font-size:15px;padding:0}
.map-search-drop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:#fff;border-radius:14px;
  box-shadow:0 4px 16px rgba(0,0,0,.14);
  display:none;  /* HIDDEN BY DEFAULT */
  overflow:hidden;max-height:200px;overflow-y:auto;z-index:10;
}
.map-search-drop.show{display:block}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.drop-item:last-child{border-bottom:none}
.drop-item:active{background:var(--bg2)}
.drop-ic{width:28px;height:28px;border-radius:50%;background:#E8F0FE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drop-ic i{font-size:13px;color:var(--blue)}
.drop-name{font-size:13px;font-weight:500;color:var(--text)}
.drop-addr{font-size:11px;color:var(--gray)}

/* Map controls */
.map-transport{
  position:absolute;top:10px;right:10px;
  background:#fff;border-radius:14px;padding:3px 5px;
  display:flex;flex-direction:column;gap:1px;
  box-shadow:0 2px 6px rgba(0,0,0,.18);z-index:10;
}
@media(orientation:landscape){.map-transport{flex-direction:row}}
.tt{padding:5px 6px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:14px;color:var(--gray);display:flex;align-items:center}
.tt.on{background:#E8F0FE;color:var(--blue)}
.map-locate{
  position:absolute;bottom:32px;right:10px;
  width:36px;height:36px;border-radius:50%;
  background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.22);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--blue);font-size:18px;z-index:10;
}
.route-bar{
  position:absolute;bottom:32px;left:10px;right:54px;
  background:#fff;border-radius:12px;
  padding:6px 12px;box-shadow:0 2px 8px rgba(0,0,0,.18);
  z-index:10;font-size:11px;
  display:none;  /* HIDDEN BY DEFAULT */
  align-items:center;gap:8px;
}
.route-bar.show{display:flex}
.map-bottom{
  position:absolute;bottom:0;left:0;right:0;height:26px;
  background:rgba(255,255,255,.9);border-top:1px solid var(--border);
  padding:0 12px;font-size:10px;color:var(--gray);
  display:flex;align-items:center;gap:5px;z-index:9;
}

/* Place card */
#place-card{
  position:absolute;bottom:26px;left:8px;right:8px;
  background:#fff;border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.22);
  z-index:11;
  display:none;  /* HIDDEN BY DEFAULT */
  flex-direction:column;
  max-height:55%;overflow-y:auto;
}
#place-card.show{display:flex}
.pc-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 0;flex-shrink:0}
.pc-close{position:absolute;top:8px;right:10px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pc-name{font-size:14px;font-weight:700;color:var(--text);padding:6px 12px 0}
.pc-type{font-size:11px;color:var(--green);padding:2px 12px 0}
.pc-rating{font-size:11px;color:var(--text2);padding:2px 12px 4px}
.pc-actions{display:flex;gap:5px;padding:6px 12px;border-bottom:1px solid var(--border);overflow-x:auto}
.pc-actions::-webkit-scrollbar{display:none}
.pca{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:50px;border:none;background:none;cursor:pointer}
.pca-ic{width:36px;height:36px;border-radius:50%;background:#E8F0FE;display:flex;align-items:center;justify-content:center}
.pca-ic i{font-size:16px;color:var(--blue)}
.pca span{font-size:10px;color:var(--text2);white-space:nowrap}
.pc-info-row{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2)}
.pc-info-row:last-child{border-bottom:none;padding-bottom:10px}
.pc-info-row i{font-size:14px;color:var(--gray);flex-shrink:0;margin-top:1px}

/* Right panel */
#right{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;height:38px}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.tab i{font-size:15px}
.pane{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;display:none}
.pane.on{display:block}

/* Itinerary */
.day-hdr{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.5px;text-transform:uppercase;padding:10px 0 4px;border-top:1px solid var(--border)}
.day-hdr:first-child{border-top:none;padding-top:0}
.stop-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.stop-wrap:last-child{border-bottom:none}
.stop-del-bg{position:absolute;right:0;top:0;bottom:0;width:60px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;z-index:0}
.stop-row{
  background:#fff;position:relative;z-index:1;
  display:flex;align-items:center;gap:8px;padding:8px 0;
  transition:transform .2s;touch-action:pan-y;
}
.stop-row.swiped{transform:translateX(-60px)}
.stop-cb{
  width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
  background:#fff;flex-shrink:0;
  display:none;  /* shown in multiselect mode */
  align-items:center;justify-content:center;cursor:pointer;
}
.stop-cb.on{background:var(--blue);border-color:var(--blue)}
.stop-cb.on::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.multiselect .stop-cb{display:flex}
.multiselect .stop-del-bg{display:none}
.stop-txt{flex:1;cursor:pointer;min-width:0}
.stop-name{font-size:12px;font-weight:500;color:var(--text)}
.stop-time{font-size:10px;color:var(--gray);margin-top:1px}
.stop-nav{background:#E8F0FE;border:none;border-radius:8px;padding:3px 7px;font-size:10px;color:var(--blue);cursor:pointer;white-space:nowrap;flex-shrink:0}
.stop-arr{font-size:14px;color:var(--gray);cursor:pointer;flex-shrink:0}
.add-stop-btn{width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:10px;background:none;cursor:pointer;font-size:12px;color:var(--blue);display:flex;align-items:center;justify-content:center;gap:5px;margin-top:10px}
.budget-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.budget-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:3px}
.budget-bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.budget-bar-fg{height:100%;background:var(--green);border-radius:3px}
.budget-nums{display:flex;justify-content:space-between;font-size:11px;margin-top:3px}
.stop-empty{font-size:12px;color:var(--gray);text-align:center;padding:24px 0}

/* Multiselect bar */
#ms-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  padding:10px 12px max(14px,env(safe-area-inset-bottom));
  z-index:200;
  display:none;  /* HIDDEN BY DEFAULT */
  flex-direction:column;gap:8px;
  box-shadow:0 -4px 20px rgba(0,0,0,.12);
}
#ms-bar.show{display:flex}
.ms-title{font-size:11px;color:var(--text2);text-align:center}
.ms-actions{display:flex;gap:8px}
.ms-btn{flex:1;padding:10px 4px;border-radius:12px;border:none;cursor:pointer;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
.ms-btn i{font-size:17px}
.ms-btn.route{background:#FFF3E0;color:#E65100}
.ms-btn.del{background:#FCE8E6;color:var(--red)}
.ms-btn.exp{background:#E6F4EA;color:#1E7A3C}
.ms-cancel{width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;font-size:13px;color:var(--gray)}

/* Detail panel */
#detail{
  position:absolute;inset:0;top:38px;
  background:#fff;z-index:20;
  display:none;  /* HIDDEN BY DEFAULT */
  flex-direction:column;
}
#detail.show{display:flex}
.det-hdr{display:flex;align-items:center;gap:8px;padding:0 12px;height:42px;border-bottom:1px solid var(--border);flex-shrink:0}
.det-back{background:none;border:none;cursor:pointer;color:var(--blue);font-size:20px;display:flex;align-items:center}
.det-title{font-size:13px;font-weight:700;color:var(--text);flex:1}
.det-time{font-size:10px;color:var(--gray);background:var(--bg2);border-radius:8px;padding:2px 7px;white-space:nowrap}
.det-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.sec{background:var(--bg2);border-radius:10px;padding:10px 12px}
.sec-t{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.sec-t i{font-size:13px}
.act-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.act-row:last-of-type{border-bottom:none}
.act-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.act-chk.done{background:var(--green);border-color:var(--green)}
.act-chk i{font-size:11px;color:transparent}
.act-chk.done i{color:#fff}
.act-lbl{flex:1;font-size:12px;color:var(--text)}
.act-lbl.done{text-decoration:line-through;color:var(--gray)}
.act-del,.note-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px}
.note-row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2)}
.note-row:last-of-type{border-bottom:none}
.note-dot{width:5px;height:5px;border-radius:50%;background:var(--yellow);flex-shrink:0;margin-top:3px}
.note-txt{flex:1;line-height:1.5}
.add-row{display:flex;gap:7px;margin-top:7px}
.add-inp{flex:1;border:1px solid var(--border);border-radius:14px;padding:6px 10px;font-size:11px;background:#fff;color:var(--text);outline:none;-webkit-appearance:none}
.add-inp:focus{border-color:var(--blue)}
.add-ok{background:var(--blue);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.add-ok i{font-size:14px;color:#fff}
.bud-row{display:flex;justify-content:space-between;align-items:center}
.bud-val{font-size:15px;font-weight:700;color:var(--blue)}
.bud-edit{background:none;border:1px solid var(--border);border-radius:8px;padding:3px 9px;font-size:11px;color:var(--gray);cursor:pointer}

/* Chat */
#pane-chat{display:none;flex-direction:column}
#pane-chat.on{display:flex}
.msg-scroll{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}
.msg-list{display:flex;flex-direction:column;gap:7px}
.msg{display:flex;gap:5px;align-items:flex-end}
.msg.me{flex-direction:row-reverse}
.bubble{max-width:75%;background:var(--bg2);border-radius:14px 14px 14px 4px;padding:7px 10px;font-size:12px;color:var(--text);line-height:1.4}
.msg.me .bubble{background:#E8F0FE;border-radius:14px 14px 4px 14px;color:#1A3A6E}
.msg-nm{font-size:9px;color:var(--text2);margin-bottom:1px}
.msg-t{font-size:9px;color:#bbb;flex-shrink:0}
.sticker-bubble{font-size:26px;background:none;padding:2px}
.chat-foot{border-top:1px solid var(--border);flex-shrink:0}
.sticker-tray{display:none;flex-wrap:wrap;gap:3px;padding:6px 10px;background:var(--bg2)}
.sticker-tray.show{display:flex}
.sk{font-size:20px;cursor:pointer;padding:3px;border-radius:6px;border:none;background:none}
.chat-inp-row{display:flex;gap:5px;padding:7px 10px;align-items:center}
.chat-inp{flex:1;border:1px solid var(--border);border-radius:18px;padding:7px 12px;font-size:12px;background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none}
.chat-send{width:32px;height:32px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}

/* Expense */
.exp-card{background:var(--bg2);border-radius:10px;padding:9px 11px;margin-bottom:7px}
.exp-top{display:flex;justify-content:space-between;align-items:center}
.exp-nm{font-size:12px;font-weight:500;color:var(--text)}
.exp-amt{font-size:12px;font-weight:700;color:var(--blue)}
.exp-meta{font-size:10px;color:var(--text2);margin-top:2px}
.settle-box{background:#E6F4EA;border-radius:10px;padding:9px 11px;margin-top:4px}
.settle-t{font-size:10px;font-weight:700;color:#1E7A3C;margin-bottom:5px}
.settle-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:var(--text)}
.settle-amt{font-size:11px;font-weight:700;color:#1E7A3C}
.add-exp-btn{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:10px;background:none;cursor:pointer;font-size:12px;color:var(--blue);display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px}

/* Locations */
.loc-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.loc-row:last-child{border-bottom:none}
.loc-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.loc-nm{font-size:12px;font-weight:500;color:var(--text)}
.loc-st{font-size:10px;color:var(--text2)}
.loc-see{font-size:10px;padding:3px 9px;border-radius:8px;background:#E8F0FE;border:none;color:var(--blue);cursor:pointer}

/* Modals */
.modal{
  position:fixed;inset:0;z-index:150;
  background:rgba(0,0,0,.4);
  display:none;  /* HIDDEN BY DEFAULT */
  align-items:flex-end;justify-content:center;
}
.modal.show{display:flex}
.modal-box{
  background:#fff;border-radius:18px 18px 0 0;
  padding:18px 18px max(32px,calc(env(safe-area-inset-bottom)+18px));
  width:100%;max-width:480px;
  max-height:80vh;overflow-y:auto;
}
.m-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.m-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.m-field{margin-bottom:10px}
.m-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:block}
.m-inp{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text);outline:none;-webkit-appearance:none;background:var(--bg2)}
.m-inp:focus{border-color:var(--blue)}
.m-sel{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text);outline:none;background:var(--bg2)}
.m-row{display:flex;gap:8px}
.m-row .m-field{flex:1}
.m-btns{position:sticky;bottom:0;background:#fff;padding:12px 0 0;display:flex;gap:8px}
.m-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:none;cursor:pointer;font-size:13px;color:var(--gray)}
.m-ok{flex:2;padding:12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.invite-code-box{background:#E8F0FE;border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
.invite-code-big{font-size:26px;font-weight:700;color:var(--blue);letter-spacing:6px}
.invite-hint{font-size:11px;color:var(--text2);margin-top:4px}
.copy-btn{margin-top:8px;padding:7px 18px;border:none;border-radius:8px;background:var(--blue);color:#fff;font-size:12px;cursor:pointer;font-weight:600}
.mem-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.mem-row:last-child{border-bottom:none}
.mem-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.mem-nm{font-size:12px;font-weight:500;color:var(--text)}
.mem-role{font-size:10px;color:var(--text2)}
.mem-acts{display:flex;gap:4px}
.mem-org-btn{font-size:10px;padding:3px 7px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--gray)}
.mem-org-btn.on{background:#E8F0FE;color:var(--blue);border-color:var(--blue)}
.mem-del-btn{font-size:10px;padding:3px 7px;border-radius:7px;border:1px solid #FCE8E6;background:none;cursor:pointer;color:var(--red)}

/* Add stop fullscreen */
#add-stop-screen{
  position:fixed;inset:0;z-index:180;
  background:#fff;
  display:none;  /* HIDDEN BY DEFAULT */
  flex-direction:column;
}
#add-stop-screen.show{display:flex}
.asp-hdr{display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.asp-cancel{background:none;border:none;cursor:pointer;font-size:14px;color:var(--blue)}
.asp-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.asp-save{background:var(--blue);border:none;border-radius:10px;padding:7px 16px;font-size:13px;color:#fff;font-weight:700;cursor:pointer}
#asp-map{flex:0 0 38%;min-height:120px;position:relative;background:#e8ecef}
#asp-gmap{position:absolute;inset:0}
.asp-search-wrap{position:absolute;top:8px;left:8px;right:8px;z-index:50}
.asp-search-bar{display:flex;align-items:center;gap:8px;padding:0 12px;height:40px;background:#fff;border-radius:20px;box-shadow:0 1px 6px rgba(0,0,0,.2)}
.asp-search-inp{flex:1;border:none;outline:none;font-size:13px;color:var(--text);background:transparent}
.asp-form{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.asp-place-info{background:#E8F5E9;border-radius:10px;padding:10px 12px;margin-bottom:12px;display:none}
.asp-place-info.show{display:block}
.asp-pname{font-size:13px;font-weight:700;color:var(--green)}
.asp-paddr{font-size:11px;color:var(--text2);margin-top:2px}
.asp-fi{margin-bottom:10px}
.asp-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:block}
.asp-inp{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text);outline:none;-webkit-appearance:none;background:var(--bg2)}
.asp-inp:focus{border-color:var(--blue)}
.asp-row{display:flex;gap:8px}
.asp-row .asp-fi{flex:1}
.asp-bottom-pad{height:max(16px,env(safe-area-inset-bottom))}

/* Segment expense modal */
.seg-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.seg-row:last-child{border-bottom:none}
.seg-sub{font-size:10px;color:var(--text2);margin-top:1px}

/* Toast */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.75);color:#fff;
  padding:14px 22px;border-radius:14px;
  font-size:13px;text-align:center;line-height:1.5;
  z-index:9999;
  display:none;  /* HIDDEN BY DEFAULT */
}
.toast.show{display:block}

/* Confirm dialog */
#confirm-dialog{
  position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,.45);
  display:none;  /* HIDDEN BY DEFAULT */
  align-items:center;justify-content:center;padding:24px;
}
#confirm-dialog.show{display:flex}
.cd-box{background:#fff;border-radius:16px;padding:24px 20px 18px;width:100%;max-width:300px;text-align:center}
.cd-icon{font-size:34px;margin-bottom:8px}
.cd-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.cd-msg{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.cd-btns{display:flex;gap:8px}
.cd-no{flex:1;padding:11px;border-radius:12px;border:1px solid var(--border);background:none;cursor:pointer;font-size:13px;color:var(--gray)}
.cd-yes{flex:2;padding:11px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer}

/* ── Trip Switcher ── */
#trip-switcher{
  position:fixed;inset:0;z-index:500;
  background:linear-gradient(160deg,#1565C0,#1A73E8 50%,#1976D2);
  display:none;
  flex-direction:column;
  padding:0;
}
#trip-switcher.show{display:flex}
.tsw-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  flex-shrink:0;
}
.tsw-back{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.2);border:none;cursor:pointer;
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;
}
.tsw-title{font-size:17px;font-weight:700;color:#fff;flex:1}
.tsw-body{flex:1;overflow-y:auto;padding:0 16px 20px}
.tsw-section-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);
  letter-spacing:.5px;text-transform:uppercase;margin:16px 0 8px}
.tsw-trip-card{
  background:#fff;border-radius:14px;padding:14px 16px;
  margin-bottom:8px;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.tsw-trip-card:active{opacity:.9}
.tsw-trip-card.current{background:#E8F0FE;border:2px solid var(--blue)}
.tsw-trip-ic{width:40px;height:40px;border-radius:10px;background:#E8F0FE;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tsw-trip-ic i{font-size:20px;color:var(--blue)}
.tsw-trip-name{font-size:14px;font-weight:700;color:var(--text)}
.tsw-trip-meta{font-size:11px;color:var(--text2);margin-top:2px}
.tsw-trip-arr{font-size:18px;color:var(--blue);opacity:.5}
.tsw-count-badge{
  font-size:11px;font-weight:700;
  background:rgba(255,255,255,.25);color:#fff;
  border-radius:20px;padding:3px 10px;
  margin-bottom:12px;display:inline-block;
}
.tsw-trip-actions{display:flex;gap:6px;margin-top:6px}
.tsw-action-btn{
  font-size:11px;padding:4px 10px;border-radius:8px;
  border:none;cursor:pointer;font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.tsw-action-btn.danger{background:#FCE8E6;color:var(--red)}
.tsw-action-btn.leave{background:#FEF3E2;color:#E65100}
.tsw-new-btns{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.tsw-new-btn{
  width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;
  display:flex;align-items:center;gap:12px;text-align:left;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.tsw-new-btn.primary{background:#fff}
.tsw-new-btn.outline{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35)}
.tsw-new-btn.primary .tsw-nb-title{color:var(--blue)}
.tsw-new-btn.outline .tsw-nb-title,.tsw-new-btn.outline .tsw-nb-sub{color:#fff}
.tsw-nb-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tsw-nb-ic.blue{background:#E8F0FE}
.tsw-nb-ic.wh{background:rgba(255,255,255,.25)}
.tsw-nb-title{font-size:14px;font-weight:700}
.tsw-nb-sub{font-size:11px;margin-top:2px;opacity:.7}
.tsw-nb-arr{font-size:18px;opacity:.4;margin-left:auto}
.tsw-new-btn.primary .tsw-nb-arr{color:var(--blue)}
.tsw-new-btn.outline .tsw-nb-arr{color:#fff}

/* Fullscreen mode */
.fullscreen-mode .topbar{display:none}
.fullscreen-mode #right .tabs{display:none}
/* show exit button in fullscreen */
#fs-exit{
  position:fixed;top:10px;right:10px;z-index:1000;
  background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;
  border-radius:20px;padding:6px 12px;font-size:12px;
  display:none;
  align-items:center;gap:5px;
}
#fs-exit.show{display:flex}

/* Online/Offline indicator */
#net-status{
  display:flex;align-items:center;gap:4px;
  font-size:10px;padding:2px 8px;border-radius:10px;
  margin-left:4px;flex-shrink:0;
}
#net-status.online{background:#E6F4EA;color:#1E7A3C}
#net-status.offline{background:#FCE8E6;color:var(--red)}

/* Offline queue badge */
#offline-badge{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);
  background:#EA4335;color:#fff;border-radius:20px;
  padding:6px 14px;font-size:12px;z-index:999;
  display:none;
  align-items:center;gap:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
#offline-badge.show{display:flex}
#pending-count{font-weight:700}

/* Trip name clickable */
.tb-trip{cursor:pointer;text-decoration:none}
.tb-trip:active{opacity:.7}
/* TripGo logo double-tap */
.tb-logo{cursor:pointer;user-select:none}

<!-- ========== JOIN SCREEN ========== -->
<div id="S-join">

  </button>

    </button>

  </button>

  <div id="js-home">

      </div>

(function(){

  // ── Offline queue ──
  var _queue = [];
  try { _queue = JSON.parse(localStorage.getItem('tg_offline_queue') || '[]'); } catch(e){}
  var _online = navigator.onLine;

  function saveQueue(){ try { localStorage.setItem('tg_offline_queue', JSON.stringify(_queue)); } catch(e){} }

  function updateOfflineUI(){
    var badge = document.getElementById('offline-badge');
    var ns    = document.getElementById('net-status');
    var nl    = document.getElementById('net-label');
    if(!badge || !ns) return;
    if(_online){
      badge.classList.remove('show');
      ns.className = 'online';
      var ic = ns.querySelector('i'); if(ic) ic.className = 'ti ti-wifi';
      if(nl) nl.textContent = '線上';
    } else {
      ns.className = 'offline';
      var ic2 = ns.querySelector('i'); if(ic2) ic2.className = 'ti ti-wifi-off';
      if(nl) nl.textContent = '離線';
      if(_queue.length > 0){
        badge.classList.add('show');
        var pc = document.getElementById('pending-count');
        if(pc) pc.textContent = _queue.length;
      }
    }
  }

  function flushQueue(){
    if(!_online || _queue.length === 0) return;
    var q = _queue.slice(); _queue = []; saveQueue(); updateOfflineUI();
    q.forEach(function(op){
      try {
        if(op.type === 'set')    db.ref(op.path).set(op.data);
        else if(op.type === 'push')   db.ref(op.path).push(op.data);
        else if(op.type === 'remove') db.ref(op.path).remove();
      } catch(e){ _queue.push(op); }
    });
    saveQueue();
  }

  window.addEventListener('online',  function(){ _online=true;  updateOfflineUI(); flushQueue(); });
  window.addEventListener('offline', function(){ _online=false; updateOfflineUI(); });

  // ── Wrapped ops with offline support ──
  function safeSet(pathOrRef, data){
    var path = (typeof pathOrRef === 'string') ? pathOrRef : pathOrRef.path || pathOrRef.toString();
    if(_online) return db.ref(path).set(data);
    _queue.push({type:'set', path:path, data:data}); saveQueue(); updateOfflineUI();
    return Promise.resolve();
  }
  function safePush(pathOrRef, data){
    var path = (typeof pathOrRef === 'string') ? pathOrRef : pathOrRef.path || pathOrRef.toString();
    if(_online) return db.ref(path).push(data);
    _queue.push({type:'push', path:path, data:data}); saveQueue(); updateOfflineUI();
    return Promise.resolve({key: '-local-'+Date.now()});
  }
  function safeRemove(pathOrRef){
    var path = (typeof pathOrRef === 'string') ? pathOrRef : pathOrRef.path || pathOrRef.toString();
    if(_online) return db.ref(path).remove();
    _queue.push({type:'remove', path:path}); saveQueue(); updateOfflineUI();
    return Promise.resolve();
  }

  // ── Expose to global ──
  // gref returns the path string (compat SDK uses db.ref(path))
  window.FB = {
    ready: true,
    gref: function(path){ return path; },
    set:          safeSet,
    push:         safePush,
    remove:       safeRemove,
    get:          function(path){ return db.ref(path).once('value'); },
    onValue:      function(path, cb){ db.ref(path).on('value', cb); },
    onChildAdded: function(path, cb){ db.ref(path).on('child_added', cb); },
    flushQueue:   flushQueue
  };

  window._fbReady = true;
  console.log('[TripGo] Firebase ready (compat)');
  requestAnimationFrame(function(){ updateOfflineUI(); });
  if(typeof window._onFbReady === 'function') window._onFbReady();
})();
</script>

<script>

// ── Map height (iOS fix) ──

// ── Location ──
function getMyLoc() {
  if (!navigator.geolocation) { document.getElementById('loc-st').textContent='不支援定位'; return; }
  navigator.geolocation.watchPosition(function(pos) {
    var lat=pos.coords.latitude, lng=pos.coords.longitude, acc=pos.coords.accuracy;
    S.myLatLng = {lat:lat,lng:lng};
    document.getElementById('loc-st').textContent = '已定位';
    if (!myMarker) {
      myMarker = new google.maps.Marker({
        position:{lat:lat,lng:lng}, map:map, zIndex:999,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#1A73E8',fillOpacity:1,strokeColor:'#fff',strokeWeight:3},
        title:'你的位置'
      });
      myCircle = new google.maps.Circle({
        map:map,center:{lat:lat,lng:lng},radius:acc,
        fillColor:'#1A73E8',fillOpacity:.1,strokeColor:'#1A73E8',strokeOpacity:.3,strokeWeight:1
      });
      map.panTo({lat:lat,lng:lng});
    } else {
      myMarker.setPosition({lat:lat,lng:lng});
      myCircle.setCenter({lat:lat,lng:lng});
      myCircle.setRadius(acc);
    }
    // Upload to Firebase
    if (S.groupCode && S.myUid) {
      window.FB.set(window.FB.gref('tripgo/groups/'+S.groupCode+'/locations/'+S.myUid),
        {uid:S.myUid,name:S.myName,lat:lat,lng:lng,acc:acc,at:Date.now()});
    }
  }, function(){ document.getElementById('loc-st').textContent='定位失敗'; },
  {enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

}

function updateMemberMarkers() {
  Object.entries(S.allLocs).forEach(function(e) {

      memberMarkers[uid] = new google.maps.Marker({
        position:{lat:loc.lat,lng:loc.lng}, map:map, zIndex:998,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#F9AB00',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
        title:loc.name

        store:'🛍 商店',aquarium:'🐠 水族館',amusement_park:'🎢 遊樂園',

// ── Divider drag ──
(function(){
  var div=document.getElementById('divider');
  var mw=document.getElementById('map-wrap');
  var dragging=false,start=0,startSz=0;
  var portrait=function(){return window.innerHeight>window.innerWidth;};
  function sd(x,y){
    dragging=true;
    start=portrait()?y:x;
    startSz=portrait()?mw.offsetHeight:mw.offsetWidth;
    document.body.style.userSelect='none';
  }
  function md(x,y){
    if(!dragging)return;
    var d=portrait()?(y-start):(x-start);
    var ns=startSz+d;
    var max=portrait()?window.innerHeight*.78:window.innerWidth*.78;
    var min=100;
    ns=Math.min(Math.max(ns,min),max);
    if(portrait()) mw.style.height=ns+'px';
    else mw.style.width=ns+'px';
    if(map) google.maps.event.trigger(map,'resize');
  }
  function ed(){dragging=false;document.body.style.userSelect='';}
  div.addEventListener('touchstart',function(e){sd(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchmove',function(e){if(dragging)md(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchend',ed);
  div.addEventListener('mousedown',function(e){sd(e.clientX,e.clientY);e.preventDefault();});
  window.addEventListener('mousemove',function(e){if(dragging)md(e.clientX,e.clientY);});
  window.addEventListener('mouseup',ed);
})();

// ── Stops ──
var MS_MODE = false;
var MS_SET = new Set();

function renderStops() {
  var el = document.getElementById('stop-list');
  if (!S.stops||S.stops.length===0) {
    el.innerHTML='<div class="stop-empty">尚無行程景點<br>點下方「新增景點」開始規劃</div>';
    return;
  }
  var lastDay='', html='';
  S.stops.forEach(function(s,i){
    if(s.day && s.day!==lastDay){
      lastDay=s.day;
      html+='<div class="day-hdr">'+s.day+'</div>';
    }
    var checked=MS_SET.has(i);
    html+='<div class="stop-wrap" id="sw-'+i+'">' +
      '<div class="stop-del-bg" data-key="'+s._key+'"><i class="ti ti-trash" style="font-size:20px"></i></div>' +
      '<div class="stop-row" id="sr-'+i+'">' +
        '<div class="stop-cb'+(checked?' on':'')+'" id="cb-'+i+'" onclick="toggleSel('+i+')"></div>' +
        '<div class="stop-txt" onclick="tapStop('+i+')">' +
          '<div class="stop-name">'+s.name+'</div>' +
          '<div class="stop-time">'+(s.arrive||'')+(s.depart?' → '+s.depart:'')+(s.note?' · '+s.note.substring(0,20):'')+'</div>' +
        '</div>' +
        (MS_MODE?'':(
          '<button class="stop-nav" onclick="navStop('+i+',event)"><i class="ti ti-navigation" style="font-size:11px"></i> 導航</button>' +
          '<i class="ti ti-chevron-right stop-arr" onclick="tapStop('+i+')"></i>'
        )) +
      '</div>' +
    '</div>';
  });
  el.innerHTML = html;
  if(MS_MODE) document.getElementById('stop-list').classList.add('multiselect');
  else document.getElementById('stop-list').classList.remove('multiselect');
  // Delegate delete button clicks
  el.querySelectorAll('.stop-del-bg').forEach(function(btn){
    btn.addEventListener('click', function(){ deleteStop(this.dataset.key); });
  });
  // Attach swipe & longpress
  S.stops.forEach(function(s,i){
    attachSwipe(i,s._key);
    attachLongpress(i);
  });
}

function attachSwipe(i, key){
  var row=document.getElementById('sr-'+i);
  if(!row)return;
  var startX=0,startY=0,dx=0;
  row.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;dx=0;},{passive:true});
  row.addEventListener('touchmove',function(e){
    dx=e.touches[0].clientX-startX;
    var dy=e.touches[0].clientY-startY;
    if(Math.abs(dy)>Math.abs(dx))return;
    if(dx<-20&&!MS_MODE){row.style.transform='translateX('+Math.max(dx,-60)+'px)';row.style.transition='none';}
  },{passive:true});
  row.addEventListener('touchend',function(){
    row.style.transition='transform .2s';
    if(dx<-40&&!MS_MODE) row.classList.add('swiped');
    else row.style.transform='translateX(0)';
  },{passive:true});
}

function attachLongpress(i){
  var row=document.getElementById('sr-'+i);
  if(!row)return;
  var t=null;
  function start(){t=setTimeout(function(){
    if(!MS_MODE){MS_MODE=true;MS_SET.clear();MS_SET.add(i);renderStops();updateMSBar();}
    else{toggleSel(i);}
  },500);}
  function cancel(){clearTimeout(t);}
  row.addEventListener('touchstart',start,{passive:true});
  row.addEventListener('touchend',cancel,{passive:true});
  row.addEventListener('touchmove',cancel,{passive:true});
  row.addEventListener('mousedown',start);
  row.addEventListener('mouseup',cancel);
  row.addEventListener('mouseleave',cancel);
}

function tapStop(i){
  if(MS_MODE){toggleSel(i);return;}
  var s=S.stops[i];
  if(!s)return;
  // Open detail panel
  S.currentStop=i;
  document.getElementById('det-title').textContent=s.name;
  document.getElementById('det-time').textContent=(s.arrive||'')+(s.depart?' → '+s.depart:'');
  document.getElementById('det-bud').textContent=s.budget||'NT$ 0';
  renderActs(s);renderNotes(s);
  document.getElementById('detail').classList.add('show');
  // Move map + show place card
  var hasCoords = s.lat && s.lng && parseFloat(s.lat)!==0 && parseFloat(s.lng)!==0;
  if(map && hasCoords){
    var lat=parseFloat(s.lat),lng=parseFloat(s.lng);
    map.panTo({lat:lat,lng:lng});map.setZoom(15);
    if(plSvc){
      plSvc.textSearch({query:s.name,location:{lat:lat,lng:lng},radius:500},function(results,status){
        if(status===google.maps.places.PlacesServiceStatus.OK&&results&&results.length>0)
          showPlaceCard(results[0].place_id);
        else showSimplePc(s);
      });
    }
  } else if(map&&plSvc){
    // Try name directly first, then with region hint
    plSvc.textSearch({query:s.name},function(results,status){
      if(status===google.maps.places.PlacesServiceStatus.OK&&results&&results.length>0){
        map.panTo(results[0].geometry.location);map.setZoom(15);
        showPlaceCard(results[0].place_id);
      } else {
        // Fallback: show simple card with no map move
        showSimplePc(s);
      }
    });
  }
}

function msRoute(){

  dsvc.route({origin:{lat:stops[sel[0]].lat,lng:stops[sel[0]].lng},
    destination:{lat:stops[sel[sel.length-1]].lat,lng:stops[sel[sel.length-1]].lng},
    waypoints:wp,travelMode:google.maps.TravelMode.DRIVING},
    function(result,status){if(status==='OK')window._orangeR.setDirections(result);});

function msExpense(){
  var sel=Array.from(MS_SET).sort(function(a,b){return a-b;});
  var names=sel.map(function(i){return S.stops[i].name;});
  var matched=Object.values(S.expenses).filter(function(e){return names.some(function(n){return e.stopName&&e.stopName===n;});});
  var paid={},share={},total=0;
  S.members.forEach(function(m){paid[m.name]=0;share[m.name]=0;});
  matched.forEach(function(e){
    total+=e.amt;
    paid[e.payer]=(paid[e.payer]||0)+e.amt;
    Object.keys(share).slice(0,e.split).forEach(function(n){share[n]=(share[n]||0)+e.per;});
  });
  var html='<div style="font-size:11px;color:var(--text2);margin-bottom:8px">景點：'+names.join('、')+'</div>';
  if(matched.length===0){
    html+='<div style="font-size:12px;color:var(--gray)">這幾個景點尚無花費記錄</div>';
  } else {
    matched.forEach(function(e){
      html+='<div class="seg-row"><div><div>'+e.name+'</div><div class="seg-sub">付：'+e.payer+' · '+e.split+'人 · NT$'+e.per+'</div></div><div style="font-weight:700;color:var(--blue)">NT$'+e.amt.toLocaleString()+'</div></div>';
    });
    html+='<div class="seg-row" style="border-top:2px solid var(--border);margin-top:4px"><b>合計</b><b style="color:var(--blue)">NT$'+total.toLocaleString()+'</b></div>';
    var balance={};
    Object.keys(paid).forEach(function(n){balance[n]=(paid[n]||0)-(share[n]||0);});
    var cr=[],db=[];
    Object.entries(balance).forEach(function(e){if(e[1]>10)cr.push({name:e[0],amt:e[1]});else if(e[1]<-10)db.push({name:e[0],amt:-e[1]});});
    if(db.length>0){
      html+='<div style="font-size:11px;font-weight:700;color:#1E7A3C;margin-top:8px">結算</div>';
      db.forEach(function(d){cr.forEach(function(c){if(d.amt>0&&c.amt>0){var t=Math.min(d.amt,c.amt);html+='<div class="seg-row"><span>'+d.name+' → '+c.name+'</span><span style="color:#1E7A3C;font-weight:700">NT$'+Math.round(t)+'</span></div>';d.amt-=t;c.amt-=t;}});});
    }
  }
  document.getElementById('seg-content').innerHTML=html;
  openModal('M-seg-expense');
  exitMS();
}

            '</div>' +

function renderExpenses(){
  var list=document.getElementById('exp-list');list.innerHTML='';
  var total=0;
  Object.values(S.expenses).forEach(function(e){
    total+=e.amt;
    var card=document.createElement('div');card.className='exp-card';
    card.innerHTML='<div class="exp-top"><span class="exp-nm">'+e.name+'</span><span class="exp-amt">NT$ '+e.amt.toLocaleString()+'</span></div>'+
      '<div class="exp-meta">付款：'+e.payer+' · '+e.split+'人平攤 · 每人 NT$ '+e.per.toLocaleString()+'</div>';
    list.appendChild(card);
  });
  var pct=Math.min(Math.round(total/200000*100),100);
  document.getElementById('bud-pct').textContent=pct+'%';
  document.getElementById('bud-fill').style.width=pct+'%';
  document.getElementById('bud-used').textContent='NT$ '+total.toLocaleString();
  calcSettle();
}
function calcSettle(){
  var paid={},share={};
  S.members.forEach(function(m){paid[m.name]=0;share[m.name]=0;});
  Object.values(S.expenses).forEach(function(e){
    paid[e.payer]=(paid[e.payer]||0)+e.amt;
    Object.keys(share).slice(0,e.split).forEach(function(n){share[n]=(share[n]||0)+e.per;});
  });
  var balance={};Object.keys(paid).forEach(function(n){balance[n]=(paid[n]||0)-(share[n]||0);});
  var cr=[],db=[];
  Object.entries(balance).forEach(function(e){if(e[1]>10)cr.push({name:e[0],amt:e[1]});else if(e[1]<-10)db.push({name:e[0],amt:-e[1]});});
  var html='';
  db.forEach(function(d){cr.forEach(function(c){if(d.amt>0&&c.amt>0){var t=Math.min(d.amt,c.amt);html+='<div class="settle-row"><span>'+d.name+' → '+c.name+'</span><span class="settle-amt">NT$ '+Math.round(t).toLocaleString()+'</span></div>';d.amt-=t;c.amt-=t;}});});
  document.getElementById('settle-rows').innerHTML=html||'<div style="font-size:11px;color:var(--gray)">目前無需結算 ✅</div>';
}
function confirmExpense(){
  var name=document.getElementById('m-name').value.trim();

  var sv=document.getElementById('m-split').value;
  var sn=sv==='all'?S.members.length:parseInt(sv);
  if(!name||!amt){alert('請填寫名稱和金額');return;}
  window.FB.push(window.FB.gref('tripgo/groups/'+S.groupCode+'/expenses'),
    {name:name,amt:amt,payer:payer,split:sn,per:Math.round(amt/sn),time:getTime()});
  closeModal('M-expense');
  document.getElementById('m-name').value='';document.getElementById('m-amt').value='';
}

async function doJoin(){
  var name=document.getElementById('inp-join-name').value.trim();
  var code=document.getElementById('inp-invite').value.trim().toUpperCase();
  var err=document.getElementById('js-err');
  if(!name){err.textContent='請輸入你的名字';return;}
  if(code.length<4){err.textContent='請輸入邀請碼';return;}
  if(!window.FB||!window.FB.ready){
    err.textContent='⏳ 連線中，2秒後自動重試…';
    setTimeout(function(){ doJoin(); }, 2000);
    return;
  }
  err.textContent='驗證中…';
  try{
    var snap=await window.FB.get(window.FB.gref('tripgo/groups/'+code));
    if(!snap.exists()){err.textContent='❌ 邀請碼無效';return;}
    var uid=name.toUpperCase().replace(/[^A-Z0-9]/g,'').substring(0,3)+Math.floor(Math.random()*99);
    await window.FB.set(window.FB.gref('tripgo/groups/'+code+'/members/'+uid),
      {id:uid,name:name,role:'member',joinedAt:Date.now()});
    var gd=snap.val();
    startApp(code,uid,name,gd.tripName||'旅遊群組',false);
  }catch(e){err.textContent='❌ 連線錯誤，請重試';console.error(e);}

// Stored trips in localStorage: [{code, uid, name, tripName, isOrg, lastAccess}]
function getStoredTrips(){
  try{ return JSON.parse(localStorage.getItem('tg_trips')||'[]'); }
  catch(e){ return []; }
}
function saveStoredTrips(trips){
  localStorage.setItem('tg_trips', JSON.stringify(trips));
}
function updateCurrentTrip(code, uid, name, tripName, isOrg){
  var trips = getStoredTrips();
  var idx = trips.findIndex(function(t){return t.code===code&&t.uid===uid;});
  var entry = {code:code, uid:uid, name:name, tripName:tripName, isOrg:isOrg, lastAccess:Date.now()};
  if(idx>=0) trips[idx]=entry;
  else trips.unshift(entry);
  // Keep max 10 trips
  if(trips.length>10) trips=trips.slice(0,10);
  saveStoredTrips(trips);
}

function openTripSwitcher(){
  var trips = getStoredTrips();
  var currentCode = S.groupCode;
  var total = trips.length;

  // ── 頂部計數說明 ──
  var tsw = document.getElementById('trip-switcher');
  // Insert count badge after header if not already there
  var existBadge = tsw.querySelector('.tsw-count-badge');
  if(existBadge) existBadge.remove();
  var badge = document.createElement('div');
  badge.className = 'tsw-count-badge';
  badge.style.margin = '0 16px 4px';
  badge.textContent = '共 '+total+' 個旅程（建立 '+trips.filter(function(t){return t.isOrg;}).length+' 個 · 加入 '+trips.filter(function(t){return !t.isOrg;}).length+' 個）';
  tsw.querySelector('.tsw-body').prepend(badge);

  // ── 目前旅程 ──
  var cur = trips.find(function(t){return t.code===currentCode;});
  var curEl = document.getElementById('tsw-current');
  if(cur){
    var isOrg = cur.isOrg;
    curEl.innerHTML =
      '<div class="tsw-trip-card current">' +
        '<div class="tsw-trip-ic"><i class="ti ti-map-2"></i></div>' +
        '<div style="flex:1">' +
          '<div class="tsw-trip-name">'+cur.tripName+'</div>' +
          '<div class="tsw-trip-meta">'+( isOrg?'👑 建立者':'👤 成員')+' · '+cur.name+' · 邀請碼 '+cur.code+'</div>' +
          '<div class="tsw-trip-actions">' +
            (isOrg
              ? '<button class="tsw-action-btn danger" data-action="delete" data-code="'+cur.code+'"><i class="ti ti-trash" style="font-size:12px"></i>刪除旅程</button>'
              : '<button class="tsw-action-btn leave" data-action="leave" data-code="'+cur.code+'"><i class="ti ti-logout" style="font-size:12px"></i>離開旅程</button>'
            ) +
          '</div>' +
        '</div>' +
        '<span style="font-size:11px;background:var(--blue);color:#fff;border-radius:8px;padding:2px 7px;flex-shrink:0">目前</span>' +
      '</div>';
    // Attach action button
    var actBtn = curEl.querySelector('[data-action]');
    if(actBtn){
      actBtn.addEventListener('click', function(e){
        e.stopPropagation();
        var action = this.dataset.action;
        var code = this.dataset.code;
        if(action==='delete') confirmDeleteTrip(code);
        else if(action==='leave') confirmLeaveTrip(code);
      });
    }
  } else { curEl.innerHTML=''; }

  // ── 其他旅程 ──
  var others = trips.filter(function(t){return t.code!==currentCode;});
  var othEl = document.getElementById('tsw-others');
  if(others.length===0){
    othEl.innerHTML='<div style="font-size:12px;color:rgba(255,255,255,.6);padding:4px 0">尚無其他旅程</div>';
  } else {
    othEl.innerHTML = others.map(function(t, idx){
      var isOrg = t.isOrg;
      return '<div class="tsw-trip-card" data-tidx="'+idx+'">' +
        '<div class="tsw-trip-ic"><i class="ti ti-map-2"></i></div>' +
        '<div style="flex:1">' +
          '<div class="tsw-trip-name">'+t.tripName+'</div>' +
          '<div class="tsw-trip-meta">'+(isOrg?'👑 建立者':'👤 成員')+' · '+t.name+'</div>' +
          '<div class="tsw-trip-actions">' +
            (isOrg
              ? '<button class="tsw-action-btn danger" data-action="delete" data-code="'+t.code+'"><i class="ti ti-trash" style="font-size:12px"></i>刪除旅程</button>'
              : '<button class="tsw-action-btn leave" data-action="leave" data-code="'+t.code+'"><i class="ti ti-logout" style="font-size:12px"></i>離開旅程</button>'
            ) +
          '</div>' +
        '</div>' +
        '<i class="ti ti-chevron-right tsw-trip-arr" style="align-self:center"></i>' +
      '</div>';
    }).join('');

    // Attach click (switch) and action button handlers
    othEl.querySelectorAll('.tsw-trip-card').forEach(function(card, idx){
      var t = others[idx];
      // Click card body to switch
      card.addEventListener('click', function(e){
        if(e.target.closest('[data-action]')) return; // ignore action btn clicks
        switchTrip(t.code, t.uid, t.name, t.tripName, t.isOrg);
      });
      // Action button
      var actBtn = card.querySelector('[data-action]');
      if(actBtn){
        actBtn.addEventListener('click', function(e){
          e.stopPropagation();
          var action = this.dataset.action;
          var code = this.dataset.code;
          if(action==='delete') confirmDeleteTrip(code);
          else if(action==='leave') confirmLeaveTrip(code);
        });
      }
    });
  }

  document.getElementById('trip-switcher').classList.add('show');
}

function confirmDeleteTrip(code){
  showCustomConfirm('🗑️','刪除旅程？',
    '刪除後所有成員、行程、聊天紀錄都會消失，<b>無法復原</b>。',
    '確定刪除',
    function(){
      var FB = window.FB;
      FB.remove(FB.gref('tripgo/groups/'+code));
      // Remove from local storage
      var trips = getStoredTrips().filter(function(t){return t.code!==code;});
      saveStoredTrips(trips);
      closeTripSwitcher();
      // If deleted current trip, go back to join screen
      if(code === S.groupCode){
        localStorage.removeItem('tg_code');
        localStorage.removeItem('tg_uid');
        localStorage.removeItem('tg_name');
        document.getElementById('S-app').classList.remove('show');
        document.getElementById('S-join').classList.remove('hide');
        showJoinHome();
      }
      showToast('✅ 旅程已刪除', 2000);
    }
  );
}

function confirmLeaveTrip(code){
  var myUid = S.myUid || localStorage.getItem('tg_uid');
  showCustomConfirm('👋','離開旅程？',
    '你將從這個旅程的成員名單中移除。',
    '確定離開',
    function(){
      var FB = window.FB;
      FB.remove(FB.gref('tripgo/groups/'+code+'/members/'+myUid));
      // Remove from local storage
      var trips = getStoredTrips().filter(function(t){return t.code!==code;});
      saveStoredTrips(trips);
      closeTripSwitcher();
      // If left current trip, go back to join screen
      if(code === S.groupCode){
        localStorage.removeItem('tg_code');
        localStorage.removeItem('tg_uid');
        localStorage.removeItem('tg_name');
        document.getElementById('S-app').classList.remove('show');
        document.getElementById('S-join').classList.remove('hide');
        showJoinHome();
      }
      showToast('✅ 已離開旅程', 2000);
    }
  );
}

function closeTripSwitcher(){
  document.getElementById('trip-switcher').classList.remove('show');
}

function switchTrip(code, uid, name, tripName, isOrg){
  closeTripSwitcher();
  // Unsubscribe current listeners (simple approach: reload app state)
  S.groupCode=null; S.stops=[]; S.members=[]; S.expenses={}; S.allLocs={};
  // Update session
  localStorage.setItem('tg_code', code);
  localStorage.setItem('tg_uid', uid);
  localStorage.setItem('tg_name', name);
  // Re-init
  startApp(code, uid, name, tripName, isOrg);
}

var _fsMode = false;
var _lastTap = 0;

// Double-tap for mobile - wrapped in try/catch, inside function
function initDoubleTapListener(){
  try {
    var logo = document.getElementById('tb-logo');
    if(!logo) return;
    logo.addEventListener('touchend', function(e){
      var now = Date.now();
      if(now - _lastTap < 300){
        e.preventDefault();
        toggleFullscreen();
      }
      _lastTap = now;
    }, {passive:false});
  } catch(err){ console.warn('doubletap init failed:', err); }
}

function toggleFullscreen(){
  _fsMode = !_fsMode;
  var app = document.getElementById('S-app');
  var fsBtn = document.getElementById('fs-exit');
  if(_fsMode){
    // Try native fullscreen
    var el = document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    app.classList.add('fullscreen-mode');
    fsBtn.classList.add('show');
  } else {
    if(document.exitFullscreen) document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    app.classList.remove('fullscreen-mode');
    fsBtn.classList.remove('show');
  }
  // Resize map
  setTimeout(function(){
    setMapHeight();
    if(map) google.maps.event.trigger(map,'resize');
  }, 300);
}

// Handle native fullscreen exit (ESC key or browser button)
document.addEventListener('fullscreenchange', function(){
  if(!document.fullscreenElement && _fsMode){
    _fsMode = false;
    document.getElementById('S-app').classList.remove('fullscreen-mode');
    document.getElementById('fs-exit').classList.remove('show');
    setTimeout(function(){ setMapHeight(); if(map) google.maps.event.trigger(map,'resize'); }, 300);
  }
});
document.addEventListener('webkitfullscreenchange', function(){
  if(!document.webkitFullscreenElement && _fsMode){
    _fsMode = false;
    document.getElementById('S-app').classList.remove('fullscreen-mode');
    document.getElementById('fs-exit').classList.remove('show');
    setTimeout(function(){ setMapHeight(); if(map) google.maps.event.trigger(map,'resize'); }, 300);
  }
});

  var depart = document.getElementById('det-edit-depart').value.trim();
  var day    = document.getElementById('det-edit-day').value.trim();
  var note   = document.getElementById('det-edit-note').value.trim();
  if(!name){ alert('請輸入景點名稱'); return; }

  var FB = window.FB;
  var path = 'tripgo/groups/'+S.groupCode+'/stops/'+s._key;
  FB.set(FB.gref(path+'/name'),   name);
  FB.set(FB.gref(path+'/arrive'), arrive);
  FB.set(FB.gref(path+'/depart'), depart);
  FB.set(FB.gref(path+'/day'),    day);
  FB.set(FB.gref(path+'/note'),   note);

  // Update local display
  document.getElementById('det-title').textContent = name;
  document.getElementById('det-time').textContent = arrive + (depart ? ' → '+depart : '');

  // Exit edit mode
  toggleEditMode();
  showToast('✅ 已儲存', 1500);
}

// ── 從地圖地點卡直接新增景點 ──
function pcAddToItinerary(){
  var place = S.currentPlace;
  if(!place) return;
  closePc();
  openAddStop();
  // Pre-fill fields after the screen opens
  setTimeout(function(){
    var nameEl = document.getElementById('ns-name');
    if(nameEl) nameEl.value = place.name || '';
    // If place has geometry, pre-fill coordinates
    if(place.geometry && place.geometry.location){
      S.aspLat = place.geometry.location.lat();
      S.aspLng = place.geometry.location.lng();
      // Move asp map to the location
      if(aspMap){
        aspMap.panTo(place.geometry.location);
        aspMap.setZoom(15);
        aspDropPin(place.geometry.location);
      }
      // Show place info
      var pname = document.getElementById('asp-pname');
      var paddr = document.getElementById('asp-paddr');
      var pinfo = document.getElementById('asp-place-info');
      if(pname) pname.textContent = place.name || '';
      if(paddr) paddr.textContent = place.formatted_address || '';
      if(pinfo) pinfo.classList.add('show');
    }
  }, 300);
}


// ── 首頁旅程預覽 ──
function onHomeNameInput(val){
  renderTripsPreview(val);
  // Also pre-fill name in sub-panels when user later clicks join/create
  localStorage.setItem('tg_last_name', val.trim());
}

function renderTripsPreview(inputName){
  var trips = getStoredTrips();
  var preview = document.getElementById('js-trips-preview');
  var list = document.getElementById('jtp-list');
  var countEl = document.getElementById('jtp-count');
  if(!preview || !list) return;

  var name = inputName ? inputName.trim().toLowerCase() : '';

  if(trips.length === 0){
    preview.style.display = 'none';
    return;
  }

  // Show all trips if name is empty; filter if name entered
  var matched = name
    ? trips.filter(function(t){ return t.name.toLowerCase().indexOf(name) >= 0; })
    : trips;

  if(matched.length === 0 && name){
    // Name entered but no match - still hide (new user)
    preview.style.display = 'none';
    return;
  }
  if(matched.length === 0){
    preview.style.display = 'none';
    return;
  }

  var built = matched.filter(function(t){ return t.isOrg; }).length;
  var joined = matched.filter(function(t){ return !t.isOrg; }).length;
  countEl.textContent = matched.length + ' 個（建立 ' + built + ' · 加入 ' + joined + '）';

  list.innerHTML = matched.slice(0, 4).map(function(t, i){
    return '<div class="jtp-card" data-tidx="'+i+'">' +
      '<div>' +
        '<div class="jtp-role">'+(t.isOrg ? '👑 建立者' : '👤 成員')+'</div>' +
        '<div class="jtp-name">'+t.tripName+'</div>' +
        '<div class="jtp-meta">邀請碼：'+t.code+'</div>' +
      '</div>' +
      '<i class="ti ti-chevron-right jtp-arr"></i>' +
    '</div>';
  }).join('') + (matched.length > 4 ? '<div style="font-size:11px;color:rgba(255,255,255,.7);text-align:center;padding:6px 0">還有 '+(matched.length-4)+' 個旅程…</div>' : '');

  preview.style.display = 'flex';

  // Attach click handlers
  list.querySelectorAll('.jtp-card').forEach(function(card, i){
    var t = matched[i];
    card.addEventListener('click', function(){
      // Auto-login to this trip
      if(!window.FB || !window.FB.ready){ showToast('⏳ 連線中，請稍後', 1500); return; }
      window.FB.get(window.FB.gref('tripgo/groups/'+t.code)).then(function(snap){
        if(snap.exists()){
          startApp(t.code, t.uid, t.name, t.tripName, t.isOrg);
        } else {
          // Trip no longer exists - remove from list
          var remaining = getStoredTrips().filter(function(x){ return x.code !== t.code; });
          saveStoredTrips(remaining);
          renderTripsPreview(inputName);
          showToast('⚠️ 此旅程已不存在', 2000);
        }
      });
    });
  });
}

// Hook name inputs to show trips preview
function initNameInputListeners(){
  // For join sub-panel
  var joinName = document.getElementById('inp-join-name');
  if(joinName){
    joinName.addEventListener('input', function(){ renderTripsPreview(this.value); });
    joinName.addEventListener('focus', function(){ renderTripsPreview(this.value); });
  }
  // For create sub-panel
  var createName = document.getElementById('inp-create-name');
  if(createName){
    createName.addEventListener('input', function(){ renderTripsPreview(this.value); });
    createName.addEventListener('focus', function(){ renderTripsPreview(this.value); });
  }
}

</script>
