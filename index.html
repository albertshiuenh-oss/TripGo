<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TripGo - 找回旅程</title>
<style>
  *{box-sizing:border-box;font-family:-apple-system,sans-serif}
  body{margin:0;padding:20px;background:#1A73E8;min-height:100vh}
  .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .title{font-size:16px;font-weight:700;color:#202124}
  .meta{font-size:12px;color:#5F6368;margin-top:4px}
  .code{font-size:14px;font-weight:700;color:#1A73E8;letter-spacing:1px;margin-top:6px}
  h1{color:#fff;font-size:20px}
  #status{color:#fff;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<h1>🔍 TripGo 旅程查詢</h1>
<div id="status">載入中…</div>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBY0DDBOOUfEaFX2DUl8iMkLmCyIPhKc3I",
  authDomain:"tripgo-6b6ed.firebaseapp.com",
  databaseURL:"https://tripgo-6b6ed-default-rtdb.firebaseio.com",
  projectId:"tripgo-6b6ed"
});
var db = firebase.database();
db.ref('tripgo/groups').once('value').then(function(snap){
  var data = snap.val();
  var status = document.getElementById('status');
  var list = document.getElementById('list');
  if(!data){ status.textContent='❌ 沒有任何旅程資料'; return; }
  var keys = Object.keys(data);
  status.textContent = '共找到 ' + keys.length + ' 個旅程';
  keys.forEach(function(code){
    var g = data[code];
    var memberCount = g.members ? Object.keys(g.members).length : 0;
    var stopCount = g.stops ? Object.keys(g.stops).length : 0;
    var members = g.members ? Object.values(g.members).map(function(m){return m.name;}).join(', ') : '';
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      '<div class="title">' + (g.tripName || '(未命名)') + '</div>' +
      '<div class="meta">成員：' + members + ' (' + memberCount + '人) · 景點數：' + stopCount + '</div>' +
      '<div class="code">邀請碼：' + code + '</div>';
    list.appendChild(div);
  });
}).catch(function(err){
  document.getElementById('status').textContent = '❌ 讀取失敗：' + err.message;
});
</script>
</body>
</html>
